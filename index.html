<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage - BKK Diamond Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout-wrapper">
        
        <div class="sidebar">
            
            <div class="logo-container">
                <div class="logo-text">
                    <span style="font-size: 3vw;">💎</span><br>
                    BKK DIAMOND<br>
                    <small>DIAMOND EXCHANGE CENTER</small>
                </div>
            </div>

            <div class="gold-title">ราคาทองคำแท่ง 96.5%</div>
            <div class="price-row">
                <div class="price-label">รับซื้อ</div>
                <div class="price-value" id="bar-buy">-</div>
            </div>
            <div class="price-row">
                <div class="price-label">ขายออก</div>
                <div class="price-value" id="bar-sell">-</div>
            </div>

            <div class="gold-title" style="margin-top: 3vh;">ราคาทองรูปพรรณ 96.5%</div>
            <div class="price-row">
                <div class="price-label">รับซื้อ</div>
                <div class="price-value" id="ornament-buy">-</div>
            </div>
            <div class="price-row">
                <div class="price-label">ขายออก</div>
                <div class="price-value" id="ornament-sell">-</div>
            </div>

            <div class="update-time" id="update-time">อัพเดทราคาล่าสุด: -</div>

        </div>

        <div class="media-section" id="media-container">
            <img src="default-bg.jpg" alt="Media Background">
        </div>

    </div>

    <div class="marquee-section">
        <marquee scrollamount="6" id="marquee-text">กำลังโหลดข้อมูล...</marquee>
    </div>

    <script type="module" src="display.js"></script>

</body>
</html>
