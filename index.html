<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BKK Diamond - Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="main-content">
        
        <div class="left-panel">
            <img src="logo.png" alt="BKK Diamond Logo" class="logo">
            
            <div class="price-title">ราคาทองคำแท่ง 96.5%</div>
            <div class="price-box">
                <div class="price-label">รับซื้อ</div>
                <div class="price-value" id="bar-buy">-</div>
            </div>
            <div class="price-box">
                <div class="price-label">ขายออก</div>
                <div class="price-value" id="bar-sell">-</div>
            </div>

            <div class="price-title" style="margin-top: 3vh;">ราคาทองรูปพรรณ 96.5%</div>
            <div class="price-box">
                <div class="price-label">รับซื้อ</div>
                <div class="price-value" id="ornament-buy">-</div>
            </div>
            <div class="price-box">
                <div class="price-label">ขายออก</div>
                <div class="price-value" id="ornament-sell">-</div>
            </div>
        </div>

        <div class="right-panel" id="media-container">
            <img src="default-bg.jpg" alt="Default Media">
        </div>

    </div>

    <div class="marquee-container">
        <marquee id="marquee-text">กำลังโหลดข้อมูล...</marquee>
    </div>

    <script type="module" src="display.js"></script>
</body>
</html>
