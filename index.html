<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage - Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signage-container">
        
        <div class="left-panel">
            <img src="logo.png" alt="Logo" style="width: 300px; margin-bottom: 50px;">
            
            <h2 style="font-size: 50px; color: #f8e1a1; margin-bottom: 20px;">ราคาทองคำแท่ง 96.5%</h2>
            <div class="price-box"><span>รับซื้อ</span> <span id="bar-buy">-</span></div>
            <div class="price-box"><span>ขายออก</span> <span id="bar-sell">-</span></div>
            
            <h2 style="font-size: 50px; color: #f8e1a1; margin-top: 40px; margin-bottom: 20px;">ราคาทองรูปพรรณ 96.5%</h2>
            <div class="price-box"><span>รับซื้อ</span> <span id="ornament-buy">-</span></div>
            <div class="price-box"><span>ขายออก</span> <span id="ornament-sell">-</span></div>
        </div>

        <div class="right-panel" id="media-container">
            <img src="default-bg.jpg" style="width:100%; height:100%; object-fit:cover;" alt="Default Background">
        </div>

        <div class="marquee-container">
            <marquee id="marquee-text">กำลังโหลดข้อมูล...</marquee>
        </div>

    </div>

    <script type="module" src="display.js"></script>
</body>
</html>
